<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Head de la page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morpion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- En-tête avec navigation entre le pixel art et le morpion -->
    <header>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Pixel Art Creator</a></li>
                <li><a href="morpion.html" class="active">Morpion</a></li>
            </ul>
        </nav>
        <h1>Morpion</h1>
    </header>

    <!-- Conteneur du morpion avec la grille, le statut et le bouton de redémarrage -->
    <main class="morpion-container">
        <div id="morpion-game">
            <div class="cell" data-cell-index="0"></div>
            <div class="cell" data-cell-index="1"></div>
            <div class="cell" data-cell-index="2"></div>
            <div class="cell" data-cell-index="3"></div>
            <div class="cell" data-cell-index="4"></div>
            <div class="cell" data-cell-index="5"></div>
            <div class="cell" data-cell-index="6"></div>
            <div class="cell" data-cell-index="7"></div>
            <div class="cell" data-cell-index="8"></div>
        </div>
        <!-- Affiche le message de l'état du jeu, par exemple: si le joueur a gagné, perdu ou si il ya un match nul -->
        <div id="game-status"></div>
        <!-- Bouton reset -->
        <button id="restart-button">Recommencer</button>
    </main>

    <!-- Chargement du script JavaScript qui contrôle la logique du Morpion -->
    <script src="js/morpion.js"></script>
</body>
</html>
