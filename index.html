<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Head de la page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Pixel Art</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- En-tête avec la navigation entre les pages morpion et pixel art -->
    <header>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" class="active">Pixel Art Creator</a></li>
                <li><a href="morpion.html">Morpion</a></li>
            </ul>
        </nav>
        <h1>Créateur de Pixel Art</h1>
    </header>

    <!-- Zone principale incluant la barre d'outils et la grille de dessin -->
    <main class="conteneur-editeur">
        <aside class="barre-outils">
            <h2>Outils</h2>
            <input type="color" id="selecteur-couleur" value="#000000">
            
            <!-- Zone de sélection des outils de dessi (crayon, gomme,etc) -->
            <div class="outils-grille">
                <button id="outil-crayon" class="actif" title="Crayon">
                    <img src="image/crayon.png" alt="Crayon">
                </button>
                <button id="outil-gomme" title="Gomme">
                    <img src="image/gomme.png" alt="Gomme">
                </button>
                <button id="outil-sceau" title="Sceau">
                    <img src="image/sceau.png" alt="Sceau">
                </button>
                <button id="outil-pipette" title="Pipette">
                    <img src="image/pipette.png" alt="Pipette">
                </button>
            </div>
            <!-- Contrôles pour régler la taille de la grille et du pinceau -->
            <label class="groupe-controle" for="taille-grille">
                <span>Taille de la grille</span>
                <select id="taille-grille">
                    <option value="16">16 x 16</option>
                    <option value="24">24 x 24</option>
                    <option value="32" selected>32 x 32</option>
                    <option value="48">48 x 48</option>
                    <option value="64">64 x 64</option>
                </select>
            </label>
            <label class="groupe-controle" for="taille-pinceau">
                <span>Taille du trait / gomme</span>
                <select id="taille-pinceau">
                    <option value="1" selected>1 case</option>
                    <option value="2">2 cases</option>
                    <option value="3">3 cases</option>
                    <option value="4">4 cases</option>
                    <option value="5">5 cases</option>
                </select>
            </label>
        </aside>

        <section class="zone-canvas">
            <canvas id="mon-canvas"></canvas>
        </section>
    </main>

    <!-- Chargement du script JavaScript qui gère le dessin et les interactions -->
    <script src="js/script.js"></script>
</body>
</html>
